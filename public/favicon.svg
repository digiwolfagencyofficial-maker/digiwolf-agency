<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="#000000"/>
  
  <!-- D letterform base -->
  <g transform="translate(100, 80)">
    <!-- D shape outer -->
    <path d="M 30 40 L 30 200 L 95 200 Q 180 200 180 120 Q 180 40 95 40 Z" fill="url(#silverGrad)" />
    <!-- D shape inner cutout -->
    <path d="M 65 75 L 65 165 L 90 165 Q 145 165 145 120 Q 145 75 90 75 Z" fill="#000000" />
    <!-- D highlight slash -->
    <path d="M 42 55 L 75 55 L 55 185 L 30 185 Z" fill="url(#whiteGrad)" opacity="0.3"/>
  </g>

  <!-- Wolf head emerging from D - geometric/faceted style -->
  <g transform="translate(175, 60)">
    <!-- Wolf neck/chest (dark) -->
    <polygon points="40,220 80,220 95,260 25,260" fill="url(#darkGrad)"/>
    <polygon points="60,240 100,230 110,270 50,275" fill="#1a1a1a"/>
    
    <!-- Wolf head main shape -->
    <polygon points="10,180 50,60 90,50 130,70 150,130 140,180 80,210 20,195" fill="url(#wolfGrad)"/>
    
    <!-- Snout -->
    <polygon points="55,140 95,145 85,185 50,178" fill="url(#snoutGrad)"/>
    <polygon points="60,175 85,178 75,195 55,190" fill="#888"/>
    
    <!-- Nose -->
    <ellipse cx="72" cy="175" rx="10" ry="7" fill="#333"/>
    
    <!-- Left ear -->
    <polygon points="15,90 35,30 60,75 30,100" fill="url(#wolfGrad)"/>
    <polygon points="22,85 38,40 55,72 32,92" fill="url(#earInner)"/>
    
    <!-- Right ear -->
    <polygon points="90,55 110,10 135,55 105,70" fill="url(#wolfGrad)"/>
    <polygon points="96,58 112,20 128,55 108,65" fill="url(#earInner)"/>
    
    <!-- Eye left -->
    <polygon points="35,120 55,110 60,125 42,133" fill="#1a1a2e"/>
    <polygon points="38,122 53,113 57,124 40,130" fill="#0a0a1a"/>
    <ellipse cx="48" cy="121" rx="6" ry="5" fill="#111" opacity="0.9"/>
    
    <!-- Eye right -->
    <polygon points="85,118 108,110 112,126 88,132" fill="#1a1a2e"/>
    <polygon points="88,120 106,113 109,125 90,129" fill="#0a0a1a"/>
    <ellipse cx="99" cy="120" rx="6" ry="5" fill="#111" opacity="0.9"/>
    
    <!-- Cheek shading -->
    <polygon points="10,140 35,120 42,155 15,165" fill="#555" opacity="0.5"/>
    <polygon points="130,130 148,150 135,170 118,148" fill="#444" opacity="0.4"/>
    
    <!-- Forehead highlight -->
    <polygon points="50,60 80,50 90,80 55,90" fill="#ffffff" opacity="0.15"/>
    
    <!-- Fur detail lines -->
    <line x1="60" y1="145" x2="40" y2="160" stroke="#777" stroke-width="1" opacity="0.5"/>
    <line x1="85" y1="148" x2="105" y2="162" stroke="#777" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#cccccc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wolfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#aaaaaa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="snoutGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cccccc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222222;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#999999;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- DIGIWOLF wordmark -->
  <text x="250" y="375" 
    font-family="'Arial Black', 'Impact', sans-serif" 
    font-size="52" 
    font-weight="900"
    letter-spacing="8"
    text-anchor="middle" 
    fill="url(#textGrad)">DIGIWOLF</text>

  <!-- Separator lines + AGENCY -->
  <line x1="90" y1="392" x2="185" y2="392" stroke="#888" stroke-width="1"/>
  <text x="250" y="410" 
    font-family="'Arial', sans-serif" 
    font-size="18" 
    font-weight="400"
    letter-spacing="12"
    text-anchor="middle" 
    fill="#aaaaaa">AGENCY</text>
  <line x1="315" y1="392" x2="410" y2="392" stroke="#888" stroke-width="1"/>

  <!-- Domain -->
  <text x="250" y="440" 
    font-family="'Arial', sans-serif" 
    font-size="14" 
    letter-spacing="3"
    text-anchor="middle" 
    fill="#666666">digiwolf.agency</text>

  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dddddd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
