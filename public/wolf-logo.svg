<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Wolf ears -->
  <polygon points="15,45 5,10 30,30" fill="#f97316"/>
  <polygon points="85,45 95,10 70,30" fill="#f97316"/>
  <!-- Inner ear detail -->
  <polygon points="17,40 10,18 28,32" fill="#c2410c"/>
  <polygon points="83,40 90,18 72,32" fill="#c2410c"/>
  <!-- Wolf head -->
  <ellipse cx="50" cy="52" rx="35" ry="30" fill="#f97316"/>
  <!-- Snout -->
  <ellipse cx="50" cy="65" rx="18" ry="12" fill="#ea580c"/>
  <!-- Eyes -->
  <ellipse cx="36" cy="47" rx="6" ry="7" fill="#1c1917"/>
  <ellipse cx="64" cy="47" rx="6" ry="7" fill="#1c1917"/>
  <!-- Eye shine -->
  <circle cx="38" cy="45" r="2" fill="white"/>
  <circle cx="66" cy="45" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="62" rx="6" ry="4" fill="#1c1917"/>
  <!-- Mouth -->
  <path d="M 44 68 Q 50 74 56 68" stroke="#1c1917" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="46" y="68" width="4" height="5" rx="1" fill="white"/>
  <rect x="51" y="68" width="4" height="5" rx="1" fill="white"/>
  <!-- Fur texture on forehead -->
  <path d="M 38 38 Q 42 33 46 36" stroke="#ea580c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 54 36 Q 58 33 62 38" stroke="#ea580c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 46 34 Q 50 30 54 34" stroke="#ea580c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
